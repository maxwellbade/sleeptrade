<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Dark background with rounded corners -->
  <rect width="200" height="200" rx="36" ry="36" fill="#0a0a1a"/>

  <!-- Subtle inner glow / gradient overlay -->
  <radialGradient id="glow" cx="35%" cy="40%" r="55%">
    <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#0a0a1a" stop-opacity="0"/>
  </radialGradient>
  <rect width="200" height="200" rx="36" ry="36" fill="url(#glow)"/>

  <!-- ── CRESCENT MOON (left side) ── -->
  <!-- Full circle filled in cyan -->
  <circle cx="72" cy="88" r="38" fill="#06b6d4"/>
  <!-- Overlay circle to punch out crescent shape -->
  <circle cx="85" cy="78" r="33" fill="#0a0a1a"/>

  <!-- ── STOCK CHART LINE (right side) ── -->
  <!-- Chart area background — subtle -->
  <rect x="118" y="62" width="56" height="56" rx="6" fill="#06b6d4" fill-opacity="0.06"/>

  <!-- Upward trending polyline -->
  <polyline
    points="122,108  134,96  146,100  158,80  168,70"
    fill="none"
    stroke="#22c55e"
    stroke-width="4"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Dot at the tip (latest price) -->
  <circle cx="168" cy="70" r="4.5" fill="#22c55e"/>

  <!-- Tiny area fill under the line for depth -->
  <polygon
    points="122,108  134,96  146,100  158,80  168,70  168,118  122,118"
    fill="#22c55e"
    fill-opacity="0.10"
  />

  <!-- Divider line between moon and chart -->
  <line x1="110" y1="62" x2="110" y2="118" stroke="#1e293b" stroke-width="1.5"/>

  <!-- ── "ST" TEXT (bottom center) ── -->
  <text
    x="100"
    y="163"
    text-anchor="middle"
    dominant-baseline="auto"
    font-family="'Inter', 'Arial Black', sans-serif"
    font-weight="900"
    font-size="34"
    letter-spacing="3"
    fill="#ffffff"
  >ST</text>

  <!-- Thin accent underline below ST -->
  <line x1="64" y1="170" x2="136" y2="170" stroke="#06b6d4" stroke-width="2" stroke-linecap="round"/>
</svg>
